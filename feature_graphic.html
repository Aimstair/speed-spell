<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Speed Spell — Feature Graphic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .canvas {
      width: 1024px;
      height: 500px;
      background: #000000;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Pastel accent stripes on edges */
    .stripe-left {
      position: absolute;
      left: 0;
      top: 0;
      width: 12px;
      height: 100%;
      background: #BDD5EB;
    }

    .stripe-right {
      position: absolute;
      right: 0;
      top: 0;
      width: 12px;
      height: 100%;
      background: #EFAFB0;
    }

    /* Subtle corner accents */
    .corner-tl {
      position: absolute;
      top: 28px;
      left: 28px;
      width: 28px;
      height: 28px;
      border-top: 2px solid rgba(255,255,255,0.15);
      border-left: 2px solid rgba(255,255,255,0.15);
    }

    .corner-br {
      position: absolute;
      bottom: 28px;
      right: 28px;
      width: 28px;
      height: 28px;
      border-bottom: 2px solid rgba(255,255,255,0.15);
      border-right: 2px solid rgba(255,255,255,0.15);
    }

    /* Main content */
    .content {
      text-align: center;
      z-index: 1;
    }

    .title {
      font-size: 96px;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: -3px;
      text-transform: uppercase;
      line-height: 1;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: rgba(255,255,255,0.3);
      margin: 22px auto;
    }

    .tagline {
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 8px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas" id="canvas">
    <!-- Edge accents -->
    <div class="stripe-left"></div>
    <div class="stripe-right"></div>

    <!-- Corner marks -->
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <!-- Main content -->
    <div class="content">
      <div class="title">SPEED SPELL</div>
      <div class="divider"></div>
      <div class="tagline">Think Fast. Spell Faster.</div>
    </div>
  </div>
</body>
</html>
